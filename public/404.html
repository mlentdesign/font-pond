<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Font Pond</title>
    <script>
      // SPA redirect for GitHub Pages
      // Converts path-based URLs to search-param URLs so the app can handle them
      // e.g. /font-pond/font/roboto -> /font-pond/font?f=roboto
      // e.g. /font-pond/pair/playfair-roboto -> /font-pond/pair?p=playfair-roboto
      (function () {
        var path = window.location.pathname;
        var base = "/font-pond";

        // Strip basePath
        var rel = path.replace(base, "");

        var fontMatch = rel.match(/^\/font\/(.+)/);
        var pairMatch = rel.match(/^\/pair\/(.+)/);

        if (fontMatch) {
          window.location.replace(base + "/font?f=" + fontMatch[1] + window.location.search.replace("?", "&") + window.location.hash);
        } else if (pairMatch) {
          window.location.replace(base + "/pair?p=" + pairMatch[1] + window.location.search.replace("?", "&") + window.location.hash);
        } else {
          // Unknown path — go home
          window.location.replace(base + "/");
        }
      })();
    </script>
  </head>
  <body></body>
</html>
