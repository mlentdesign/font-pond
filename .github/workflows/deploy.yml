name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Restore cached font/pair pages from previous builds
      - name: Restore CMS page cache
        uses: actions/cache@v4
        with:
          path: |
            out/font
            out/pair
          key: cms-pages-${{ hashFiles('src/data/all-pair-slugs.json', 'src/data/font-slugs.json') }}
          restore-keys: |
            cms-pages-

      - run: npx next build
        env:
          NEXT_PUBLIC_BASE_PATH: /font-pond
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Generate remaining CMS pages
        run: node scripts/generate-remaining-pairs.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
