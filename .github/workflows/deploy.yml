name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Check if font/pair data changed — only regenerate slugs + pair pages if so
      - name: Check if data files changed
        id: data-check
        run: |
          if git diff HEAD~1 --name-only | grep -qE '^src/data/|^src/lib/pair-generator'; then
            echo "data_changed=true" >> $GITHUB_OUTPUT
          else
            echo "data_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate slug lists for all fonts and pairs
        if: steps.data-check.outputs.data_changed == 'true'
        run: |
          npx tsx -e "
            import { fonts } from './src/data/fonts';
            import { fontPairs } from './src/data/pairs';
            import { writeFileSync } from 'fs';
            writeFileSync('src/data/font-slugs.json', JSON.stringify(fonts.map(f => f.slug)));
            writeFileSync('src/data/all-pair-slugs.json', JSON.stringify(fontPairs.map(p => p.slug)));
            console.log('Generated', fonts.length, 'font slugs and', fontPairs.length, 'pair slugs');
          "
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - run: npx next build
        env:
          NEXT_PUBLIC_BASE_PATH: /font-pond
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Generate remaining pair pages
        run: node scripts/generate-remaining-pairs.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
